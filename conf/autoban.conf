[global]
# Lệnh thực thi hệ thống khi phát hiện chặn (Support IPv4 & IPv6).
# %s: Sẽ được thay thế bằng IP (Vd: 192.168.1.1 hoặc 2001:db8::1)
# %d: Sẽ được thay thế bằng Thời gian tính theo Giây
block_cmd = /usr/sbin/ipset add autoban_list %s timeout %d -!
block_cmd_v6 = /usr/sbin/ipset add autoban_list_v6 %s timeout %d -!
#
# Ví dụ chạy với Nftables trực tiếp (với Set tên blacklist đã được tạo config timeout):
# block_cmd = nft add element inet filter blacklist { %s timeout %ds }

# Thời gian mặc định chặn (nếu website không được cấu hình đính kèm)
default_ban_time = 7200

# Danh sách identifier journal theo dõi (phân tách bởi dấu phẩy)
journal_match = nginx_error,nginx_error:,apache_error,syslog

# Multi-Level Ban: Ngưỡng vi phạm tối thiểu để bắt đầu thực hiện lệnh chặn (Mặc định: 1)
# Ví dụ: min_ban_threshold = 5 sẽ đợi IP spam 5 lần rồi mới Block hẳn.
min_ban_threshold = 3

# Số lần vi phạm tối đa trước khi áp dụng lệnh chặn vĩnh viễn (Permanent Ban)
max_ban_retries = 5

# Thời gian (giây) để reset bộ đếm vi phạm (Offense counter) cho IP. (Mặc định: 86400 - 24h)
ban_time_window = 3600

# Chỉ số Group trong Regex (Bắt đầu từ 1. Mặc định: IP=1, Server=2)
# ip_group_idx = 1
# server_group_idx = 2

# Đường dẫn Unix Control Socket (Mặc định: /run/autoban/autoban.sock)
# control_socket = /run/autoban/autoban.sock

# Ngưỡng giới hạn tổng thể (Global Rate Limit) để chống AutoBan Fork-Bomb.
# Số lệnh Block tối đa được thực thi mỗi phút. Vượt ngưỡng sẽ in Warning & Drop. (Mặc định: 1000)
# 3000/phút tương đương tối đa 50 blocks/giây.
max_blocks_per_minute = 50

# Tuỳ chỉnh cache RAM hạn chế lặp lệnh IP liên tiếp để ngừa DDoS (Bỏ qua cấu hình nếu bằng 256 mặc định)
# Lưu ý: Cache hiện tại dùng thuật toán quét Mảng Tuyến Tính O(N).
# KHUYẾN CÁO: Không nên đặt tham số này quá lớn (>1000) để tránh drop tốc độ xử lý Worker.
cache_size = 500

