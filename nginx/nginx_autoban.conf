# NGINX Configuration Sample cho AutoBan
# Phục vụ để tạo error rate limit và map xuống SD-Systemd Journald

# Ghi chú: Chuyển toàn bộ Error Log ra syslog nội bộ (unix domain socket), 
# Systemd journald sẽ tự động hứng các log dạng này (vì nó nghe ở /dev/log).
error_log syslog:server=unix:/dev/log,nohostname,tag=nginx_error error;

http {
    # 1. Định nghĩa các Rate Limit Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=5r/s;

    # 2. Cấu hình Virtual Hosts
    server {
        listen 80;
        server_name api.example.com;

        location / {
            # Bật Rate limit
            limit_req zone=api_limit burst=5 nodelay;

            # Nội dung pass tới FPM (như sơ đồ vẽ)
            fastcgi_pass unix:/run/php/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
    
    server {
        listen 80;
        server_name web.example.com;

        location / {
            limit_req zone=web_limit burst=20 nodelay;
            
            fastcgi_pass unix:/run/php/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}
